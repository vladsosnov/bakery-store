name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --include=optional
      - name: Install backend deps
        working-directory: backend
        run: npm ci --include=optional
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: Lint backend
        working-directory: backend
        run: npm run lint

  backend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Install backend deps
        working-directory: backend
        run: npm ci --include=optional
      - name: Run backend coverage
        working-directory: backend
        run: npm run test:coverage -- --coverageReporters=text-summary --coverageReporters=lcov
      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage/lcov.info
          flags: backend
          name: backend-api
          fail_ci_if_error: false
      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci --include=optional
      - name: Workaround npm optional deps bug for Rollup (frontend)
        if: matrix.app == 'frontend'
        working-directory: frontend
        run: npm install --no-save @rollup/rollup-linux-x64-gnu
      - name: Workaround npm optional deps bug for SWC (frontend)
        if: matrix.app == 'frontend'
        working-directory: frontend
        run: npm install --no-save @swc/core @swc/core-linux-x64-gnu
      - name: Build ${{ matrix.app }}
        working-directory: ${{ matrix.app }}
        run: npm run build

  frontend-ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --include=optional
      - name: Run frontend coverage
        working-directory: frontend
        run: npm run test:coverage -- --coverageReporters=text-summary --coverageReporters=lcov --coverageReporters=cobertura --coverageReporters=json-summary
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: frontend/coverage/lcov.info
          flags: frontend
          name: frontend-ui
          fail_ci_if_error: false
      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: frontend/coverage/cobertura-coverage.xml
          format: markdown
          output: both
      - name: Coverage PR comment
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: code-coverage-results.md
